<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <title>Enneagram Personality Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.8; background-color: #f4f7f6; color: #333; padding-bottom: 50px;}
    h2 { text-align: center; color: #2c3e50; margin-bottom: 30px; line-height: 1.5; }
    .question-card { margin: 15px auto; padding: 20px; border-radius: 8px; background-color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 800px; }
    .question-title { font-weight: bold; margin-bottom: 15px; font-size: 16px; color: #2980b9; }
    .option { display: block; margin-bottom: 10px; cursor: pointer; padding: 10px; border-radius: 5px; transition: background 0.2s; background-color: #fdfdfd; border: 1px solid #eee;}
    .option:hover { background-color: #f0f8ff; border-color: #b3d4fc; }
    input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
    button { display: block; margin: 40px auto; padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #27ae60; color: white; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;}
    button:hover { background-color: #2ecc71; transform: translateY(-2px); }
    #resultArea { margin: 30px auto; padding: 25px; border-radius: 10px; background-color: #e8f8f5; max-width: 800px; display: none; border-left: 5px solid #1abc9c; }
    #resultTitle { color: #16a085; font-size: 22px; }
  </style>
</head>
<body>
  <h2>Enneagram စရိုက်လက္ခဏာ စမ်းသပ်မှု<br><span style="font-size: 16px; color: #7f8c8d;">(မေးခွန်းအားလုံးကို ဖြေဆိုပြီး အောက်ဆုံးရှိ ခလုတ်ကို နှိပ်ပါ)</span></h2>

  <div id="quizContainer"></div>
  
  <button id="submitBtn" onclick="calculateResult()">ရလဒ် အဖြေကို တွက်ချက်မည်</button>

  <div id="resultArea">
    <h3 id="resultTitle"></h3>
    <p id="top3Types" style="font-size: 18px; line-height: 2;"></p>
  </div>

  <script>
    // သင်ပေးထားသော မေးခွန်း ဒေတာများ (Array)

      ["1", "စိတ်ကူးယဉ်တတ်သူလား၊ လက်တွေ့ကျသူလား", "ငါဟာ စိတ်ကူးလည်း ယဉ်တတ်တယ်။ စိတ်ကူးစိတ်သန်းလည်း ကောင်းတယ်။ (E)", "ငါဟာ လက်တွေ့ကျတယ်။ ကြားဖြတ်ပါဝါ မနေဘူး။ လိုတာထက် ပိုတာမျိုးကို လုပ်လေ့ မရှိဘူး။ (B)"],
      ["2", "ပြဿနာကို ရင်ဆိုင်ပုံ", "ငါဟာ ပြဿနာကို ထိပ်တိုက် ရင်ဆိုင်လေ့ရှိတယ်။ (G)", "ငါဟာ ပြဿနာကို ထိပ်တိုက် ရင်ဆိုင်လေ့ မရှိဘူး။ (A)"],
      ["3", "လုပ်ဆောင်ချက် စရိုက်", "ငါဟာ အဆင်ပြေအောင် ကြည့်ပြောတတ်တယ်။ အောင်မြင်မှုပန်းတိုင် ရည်မှန်းချက် ကြီးတယ်။ (C)", "ငါဟာ ပရိယာယ် မသုံးတတ်ဘူး။ ထုံးတမ်းစဉ်လာအတိုင်းပဲ လုပ်တယ်။ စံထားချက် မြင့်တယ်။ (D)"],
      ["4", "အလုပ်လုပ်ပုံ အာရုံစိုက်မှု", "ငါဟာ အာရုံစိုက်တယ်။ အားသွန်ခွန်စိုက် လုပ်တတ်တယ်။ (H)", "ငါဟာ စိတ်ကူးပေါက်တာလုပ်တတ်တယ်။ ပျော်ပျော်နေတတ်တယ်။ (I)"],
      ["5", "ပေါင်းသင်းဆက်ဆံရေး", "ငါဟာ ဖော်ရွေတယ်။ ကိုယ့်ဘဝထဲကို မိတ်သစ် ဆွေသစ်တွေ ရောက်လာတာကို ဖိတ်ခေါ်တတ်တယ်။ (F)", "ငါဟာ သီးသီးသန့်သန့် နေတတ်တယ်။ လူအများနှင့် သိပ်ရောလေ့ မရှိဘူး။ (E)"],
      ["6", "စိတ်ပူပန်မှု အခြေအနေ", "ငါဟာ ဖြစ်လာနိုင်တဲ့ ပြဿနာတွေအတွက် စိတ်ပူပန်မှုကို ရပ်ပစ်ဖို့ ခက်ခဲတယ်။ (B)", "ငါဟာ ဖြစ်လာနိုင်တဲ့ ပြဿနာနဲ့ ပတ်သက်ပြီး ပူပန်ကြောင့်ကြမှု မထားပါဘူး။ (A)"],
      ["7", "အခြေအနေအလိုက် နေထိုင်မှု", "ငါဟာ အခြေအနေကို ကြည့်ပြီး အဆင်ပြေအောင် နေတတ် လုပ်တတ်တယ်။ (G)", "ငါဟာ စိတ်နေ မြင့်တယ်။ လူလည်လုပ် မစားတတ်ဘူး။ (D)"],
      ["8", "လူမှုရေး လိုအပ်ချက်", "လူတွေကို ချစ်ခင်ကြောင်း ပြဖို့ဟာ ငါ့ရဲ့ လိုအပ်ချက် ဖြစ်တယ်။ (F)", "လူတွေနဲ့ ခပ်ခွာခွာလေးနေရတာ ပိုနှစ်သက်တယ်။ (H)"],
      ["9", "အတွေ့အကြုံသစ်အပေါ် အမြင်", "ဒီအတွေ့အကြုံဟာ ငါ့အတွက် အသုံးဝင်မှာလားလို့ မေးလေ့ရှိတယ်။ (C)", "ဒီအတွေ့အကြုံဟာ ငါ့အတွက် ပျော်စရာကောင်းမှာလားလို့ မေးလေ့ရှိတယ်။ (I)"],

      ["11", "သူတစ်ပါး အားကိုးမှု", "ငါ့ရဲ့ အသိဉာဏ် နက်နဲမှုနဲ့ ဗဟုသုတအပေါ်မှာ အားကိုးကြတယ်။ (H)", "ငါ့ရဲ့ စိတ်ဓာတ် ကြံ့ခိုင်မှုနဲ့ ဆုံးဖြတ်ချက် ပြတ်သားမှုအပေါ်မှာ အားကိုးကြတယ်။ (G)"],
      ["12", "ကိုယ့်ကိုယ်ကိုယ် ယုံကြည်မှု", "ငါဟာ ကိုယ့်ကိုယ်ကိုယ် သိပ်မသေချာတဲ့ပုံ ပေါက်နေတယ်။ (B)", "ငါဟာ ကိုယ့်ကိုယ်ကိုယ် သေချာတဲ့ပုံ ပေါက်တယ်။ (D)"],

      ["14", "ပြောဆိုဆက်ဆံပုံ", "ငါဟာ ကိုယ့်အရေးကို တောင်းဆိုတာကို မလုပ်နိုင်ဘူး။ (E)", "ငါဟာ မပြောရဲတဲ့ စကားတွေကို ရဲရဲတင်းတင်း ပြောရဲတယ်။ (I)"],

      ["16", "စိတ်နေစိတ်ထား", "ငါဟာ မှားမှာကြောက်တယ်။ တွန့်ဆုတ်နေတတ်တယ်။ (B)", "ငါဟာ ရဲတင်းတယ်။ လွှမ်းမိုးကြိုးကိုင်တတ်တယ်။ (G)"],
      ["17", "ဆက်ဆံရေး အခက်အခဲ", "လူအများနှင့် အလွန်အကျွံပတ်သက်ရမှာ စိတ်မပါလို့ အခက်အခဲဖြစ်တယ်။ (A)", "လူတွေကို အားကိုးအောင် လုပ်ချင်စိတ် အားကြီးလွန်းလို့ အခက်အခဲဖြစ်တယ်။ (F)"],
      ["18", "အလုပ်နှင့် ခံစားချက်", "အလုပ်ပြီးဖို့အတွက် ခံစားချက်တွေကို ဘေးဖယ်ထားနိုင်တယ်။ (C)", "လုပ်စရာကို လုပ်ဖို့ ခံစားချက်တွေကို အရင်ပြေလည်အောင် ဖြေရှင်းရမယ်။ (E)"],
      ["19", "လုပ်ငန်းစဉ် စရိုက်", "ငါဟာ စနစ်တကျ လုပ်တတ်တယ်။ အမှားအယွင်းကင်းအောင် သတိထားတယ်။ (B)", "ငါဟာ စွန့်စွန့်စားစား လုပ်တတ်တယ်။ အဆိုးတွေကို ရင်ဆိုင်လိုက်တယ်။ (I)"],

      ["131", "ရွေးချယ်မှု စရိုက်", "လုပ်နေကျအလုပ်နဲ့ အလုပ်သစ်ထဲက များသောအားဖြင့် အသစ်ကိုရွေးတယ်။ (I)", "ငါကြိုက်တယ်လို့ သိပြီးသားကိုပဲ များသောအားဖြင့် ရွေးချယ်တယ်။ (B)"],
      ["132", "မေတ္တာဖော်ပြမှု", "သူတို့ စိတ်အေးဖို့အတွက် ခန္ဓာကိုယ်ချင်း ထိတွေ့မှု အများကြီး ပေးခဲ့တယ်။ (F)", "မေတ္တာဟာ ခန္ဓာကိုယ်ထိတွေ့မှုပေါ်မှာ မမူတည်ဘူးလို့ ခံစားရပါတယ်။ (D)"],
      ["133", "ရင်ဆိုင်ပုံ နည်းလမ်း", "တစ်စုံတစ်ယောက်ကို တိုက်ရိုက် တည်တည် ပြင်းပြင်းထန်ထန် ပြောတယ်။ (G)", "တစ်စုံတစ်ယောက်ကို ဝေ့လည်ကြောင်ပတ် သွယ်ဝိုက်ပြောတာ များတယ်။ (C)"],

      ["135", "ပြဿနာ၏ အခြေခံ", "ငါက ဝင်စွက် နှောင့်ယှက်တာ များလွန်းလို့ ပြဿနာဖြစ်ရတယ်။ (F)", "ရှောင်လွှဲနေတတ် ပွင့်လင်းစွာ မပြောတာ များလို့ ပြဿနာဖြစ်ရတယ်။ (B)"],
      ["136", "သောက ဖြစ်ရသည့် အကြောင်း", "တာဝန်ကျေဖို့ ငွေ၊ အချိန်၊ အင်အား မရှိဘူးဆိုပြီး သောကများတယ်။ (G)", "စိတ်ကျေနပ်မှုရမယ့်ကိစ္စကို အာရုံစိုက်ဖို့ စည်းကမ်းမထားနိုင်လို့ သောကများ။ (I)"],
      ["137", "ယေဘုယျ စရိုက်", "ထိုးထွင်းသိမြင်စွမ်း မြင့်ပြီး ကိုယ့်စိတ်ကူးနဲ့ကိုယ် လုပ်တတ်သူ။ (E)", "စည်းစနစ်ကြီးပြီး တာဝန်သိ တာဝန်ကျေတဲ့သူ ဖြစ်တယ်။ (D)"],
      ["138", "အဓိက ပြဿနာ", "တစ်ခုခုကိုလုပ်မိဖို့ ခက်နေတာဟာ ငါ့ရဲ့ အဓိကပြဿနာပါပဲ။ (A)", "လုပ်နေရင် အရှိန်လျှော့လို့မရတာဟာ ငါ့ရဲ့ အဓိကပြဿနာပါပဲ။ (I)"],
      ["139", "စိတ်မလုံခြုံမှု တုံ့ပြန်ပုံ", "မထီမဲ့မြင် ပြတဲ့နည်းနဲ့၊ ဂရုမစိုက်တဲ့ အမူအရာနဲ့ တုံ့ပြန်တယ်။ (C)", "ကိုယ့်ကိုယ်ကို ကာကွယ်တယ်။ ဝေဖန်ကန့်ကွက်တဲ့ နည်းနဲ့ တုံ့ပြန်တယ်။ (B)"],
      ["140", "သဘောထား စရိုက်", "အမြင်သစ်ကို ခံယူနိုင်တဲ့ ပွင့်လင်းတဲ့ လမ်းဖွင့်ထားတဲ့ သဘောထား ရှိ။ (H)", "ကိုယ့်အကြောင်းကိုယ် ပြောလေ့ရှိပြီး ခံစားချက်ကို သူများကို မျှချင်တယ်။ (E)"],
      ["141", "အများအမြင် စရိုက်", "တကယ်ဟုတ်တာထက် ပိုမာတယ် ပိုခိုင်မာတယ်လို့ ထင်ရအောင် ပြတတ်တယ်။ (G)", "သူတစ်ပါးကို ကူညီချင်စိတ် ရှိတယ်လို့ တကယ်ထက် ပိုမြင်အောင် ပြတတ်တယ်။ (F)"],
      ["142", "ကြိုးစားမှု ဦးတည်ချက်", "အမှားမရှိ အကောင်းဆုံးအခြေအနေကို ပိုင်ဆိုင်ဖို့ အစွမ်းကုန် ကြိုးစားတယ်။ (D)", "ငါ့ရဲ့ ခံစားမှုတွေနဲ့ ရုတ်တရက်ဖြစ်လာတဲ့ ဆန္ဒနောက်ကို လိုက်လုပ်တယ်။ (I)"],
      ["143", "အခက်အခဲအပေါ် တုံ့ပြန်မှု", "ကြီးမားတဲ့အခက်အခဲတွေဟာ ငါ့ကို ပိုပြီးတော့ စိတ်မာစေတယ်။ (C)", "ကြီးမားတဲ့အခက်အခဲတွေဟာ ငါ့ကို စိတ်ဓာတ်ကျ နောက်ဆုတ်သွားစေတယ်။ (A)"],
      ["144", "စီစဉ်မှု စရိုက်", "တစ်ခုခုဖြစ်ရင် နောက်တစ်ခု လုပ်လို့ရအောင် စီစဉ်ပြီး လုပ်လေ့ရှိတယ်။ (B)", "မသေချာတဲ့ စွန့်စားရတဲ့ဘဝနဲ့ မှီခိုမှု နည်းတဲ့ဘဝကို ရွေးချယ်တယ်။ (H)"]
    ];

    let totalQuestions = 0;

    // ဝဘ်ဆိုက်ဖွင့်သည်နှင့် မေးခွန်းများကို အလိုအလျောက် ပုံဖော်ပေးခြင်း
    window.onload = function() {
      const quizContainer = document.getElementById('quizContainer');
      quizContainer.innerHTML = ''; 

      rawData.forEach(function(row) {
        let qNo = row[0];
        let qText = row[1];
        let opt1 = row[2];
        let opt2 = row[3];
        
        // ကွင်းစကွင်းပိတ် အတွင်းရှိ (A, B, C...) အက္ခရာများကို ရှာဖွေခြင်း
        let match1 = opt1.match(/\(([A-I])\)/);
        let match2 = opt2.match(/\(([A-I])\)/);
        
        let val1 = match1 ? match1[1] : '';
        let val2 = match2 ? match2[1] : '';

        if(val1 && val2) {
          totalQuestions++;
          
          const qDiv = document.createElement('div');
          qDiv.className = 'question-card';
          qDiv.innerHTML = `
            <div class="question-title">${qNo}။ ${qText}</div>
            <label class="option"><input type="radio" name="q${totalQuestions}" value="${val1}"> ${opt1}</label>
            <label class="option"><input type="radio" name="q${totalQuestions}" value="${val2}"> ${opt2}</label>
          `;
          quizContainer.appendChild(qDiv);
        }
      });
    };

    // အမှတ်ပေါင်းပြီး အဖြေထုတ်ရန်
    function calculateResult() {
      let scores = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, G: 0, H: 0, I: 0 };
      let answered = 0;

      for (let i = 1; i <= totalQuestions; i++) {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (selected) {
          scores[selected.value]++;
          answered++;
        }
      }

      if (answered < totalQuestions) {
          alert("မေးခွန်းအားလုံး ဖြေဆိုရန် လိုအပ်ပါသည်။ (လက်ရှိ ဖြေဆိုပြီး: " + answered + " / စုစုပေါင်း: " + totalQuestions + ")");
          return;
      }

      let typeNames = {
          "A": "Type 9 (The Peacemaker)", "B": "Type 6 (The Loyalist)",
          "C": "Type 3 (The Achiever)", "D": "Type 1 (The Reformer)",
          "E": "Type 4 (The Individualist)", "F": "Type 2 (The Helper)",
          "G": "Type 8 (The Challenger)", "H": "Type 5 (The Investigator)",
          "I": "Type 7 (The Enthusiast)"
      };

      // အမှတ်အများဆုံး အစဉ်လိုက် စီခြင်း
      let sortedScores = Object.keys(scores).map(key => {
        return { type: key, score: scores[key], name: typeNames[key] };
      }).sort((a, b) => b.score - a.score);

      let top1 = sortedScores[0];
      let top2 = sortedScores[1];
      let top3 = sortedScores[2];

      document.getElementById("resultArea").style.display = "block";
      document.getElementById("resultTitle").innerText = "🎉 သင့်၏ အဓိက စရိုက်လက္ခဏာ: " + top1.name;
      
      document.getElementById("top3Types").innerHTML = `
        <b>ရမှတ်အများဆုံး ထိပ်ဆုံး (၃) ခု:</b><br><br>
        ၁။ <b>${top1.name}</b> (ရမှတ်: ${top1.score} ခု)<br>
        ၂။ <b>${top2.name}</b> (ရမှတ်: ${top2.score} ခု)<br>
        ၃။ <b>${top3.name}</b> (ရမှတ်: ${top3.score} ခု)<br><br>
        <i>(မှတ်ချက် - သင်၏ အခြား Type ရမှတ်များမှာ ပုံစံအမျိုးမျိုး ရှိနိုင်ပြီး၊ အထက်ပါ ၃ မျိုးသည် သင့်အပေါ် အလွှမ်းမိုးဆုံးသော စရိုက်များ ဖြစ်ပါသည်။)</i>
      `;
      
      // ရလဒ်ထွက်ပါက အောက်ဆုံးသို့ အလိုအလျောက် ရွှေ့ပေးရန်
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
  </script>
